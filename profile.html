<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevaMitra - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
<nav class="bg-white shadow-lg fixed w-full top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-bold text-purple-600">SevaMitra</span>
                </div>
                <div class="hidden md:ml-6 md:flex md:space-x-8">
                    <a href="index.html#services" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium">Services</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium">Bookings</a>
                    <a href="profile.html" class="text-gray-700 hover:text-purple-600 px-3 py-2 text-sm font-medium">Profile</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<section class="pt-24 pb-20 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-8">My Profile</h2>
    <div class="bg-white rounded-xl p-8 shadow-lg space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
            <input type="text" value="Ayush kumar sharma" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input type="email" value="ash@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
            <input type="text" value="+91 9115****30" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
        </div>
        <button class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition duration-200">Update Profile</button>
    </div>
</section>
</body>
</html>
